{% extends 'base.html' %}

{% block titulo %}Login{% endblock %}

{% block content %}
    <h2>
        Login
    </h2>

    <form method="post">
        <input type="text" name="cpf" placeholder="CPF/CNPJ"> <br>
        <input type="password" name="password" placeholder="Senha"> <br>
        <button type="submit">Login</button>
    </form>
    
    <a href="/cadastro">
        Não tem uma conta ainda?
    </a>

{% endblock %}

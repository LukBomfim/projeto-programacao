<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNICAR | Cadastro</title>
</head>
<body>
    <div id="container-principal">

        <header>
            <h1>
                <a href="index.html">UNICAR - Caronas universitárias</a>
            </h1>

            <nav>
                <a href="index.html" class="links-nav">Início</a>
                <a href="login.html" class="links-nav">Sua conta</a>
                <a href="historico.html" class="links-nav">Histórico</a>
            </nav>

            <hr>
        </header>

        <main>
            <h2>
                Cadastro
            </h2>
            
            <form action="" method="post">

                <input type="text" id="input-nome" placeholder="Nome completo"> <br>
                <input type="text" id="input-cpf" placeholder="CPF"> <br>
                <input type="text" id="input-email" placeholder="E-mail"> <br>
                <input type="text" id="input-telefone" placeholder="Telefone"> <br>
                <input type="password" id="input-senha" placeholder="Senha"> <br>

                Envie o comprovante de matrícula de sua universidade: <br>
                <input type="file" name="" id="input-matricula" accept="image/*"> <br>
                
                <button type="submit">Cadastrar</button>
            </form>

        </main>

    </div>
</body>
</html>
